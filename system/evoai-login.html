<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>evoAI — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signInWithPopup,
           GoogleAuthProvider, sendPasswordResetEmail, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

  /* ══════════════════════════════════════
     PASTE YOUR FIREBASE CONFIG HERE
  ══════════════════════════════════════ */
  const firebaseConfig = {
  apiKey: "AIzaSyC4k4kJZ2aDrYs7Ah-H0SuMF-d8s55X9ZM",
  authDomain: "evoai-authentication.firebaseapp.com",
  projectId: "evoai-authentication",
  storageBucket: "evoai-authentication.firebasestorage.app",
  messagingSenderId: "77079760801",
  appId: "1:77079760801:web:2bbfeffffc38a6265c45e0"
};

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const gProvider = new GoogleAuthProvider();

  /* ── Only redirect if ALREADY signed in — don't hide the page ── */
  let authChecked = false;
  onAuthStateChanged(auth, user => {
      if (!authChecked) {
        authChecked = true;
	
	  if (user) {
		console.log("User already logged in:", user.email);
		window.location.href = "evoai-leads.html";
	  } else {
		console.log("No active session");
	  }
    }
  });

  /* ── EMAIL / PASSWORD SIGN IN ── */
  window.doSignIn = async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showError('Please enter your email and password.'); return; }

    const btn = document.getElementById('signInBtn');
    setLoading(btn, true);
    clearMessages();

    try {
      await signInWithEmailAndPassword(auth, email, password);
      /* onAuthStateChanged will trigger the redirect */
    } catch (err) {
      setLoading(btn, false);
      showError(friendlyError(err.code));
    }
  };

  /* ── GOOGLE SIGN IN ── */
  window.googleLogin = async () => {
    const btn = document.getElementById('googleBtn');
    btn.disabled = true;
    btn.innerHTML = `<span class="btn-spinner" style="border-color:rgba(0,0,0,.2);border-top-color:#333"></span> Signing in…`;
    clearMessages();
    try {
      await signInWithPopup(auth, gProvider);
      /* onAuthStateChanged handles redirect */
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = googleBtnHTML();
      if (err.code !== 'auth/popup-closed-by-user') showError(friendlyError(err.code));
    }
  };

  /* ── FORGOT PASSWORD ── */
  window.doReset = async () => {
    const email = document.getElementById('email').value.trim();
    if (!email) { showError('Enter your email address above, then click Forgot password.'); return; }
    const btn = document.getElementById('resetBtn');
    btn.disabled = true; btn.textContent = 'Sending…';
    clearMessages();
    try {
      await sendPasswordResetEmail(auth, email);
      showSuccess('Reset link sent — check your inbox.');
    } catch (err) {
      showError(friendlyError(err.code));
    } finally {
      btn.disabled = false; btn.textContent = 'Forgot password?';
    }
  };

  /* ── HELPERS ── */
  function friendlyError(code) {
    const map = {
      'auth/invalid-credential':     'Invalid email or password.',
      'auth/user-not-found':         'No account found with this email.',
      'auth/wrong-password':         'Incorrect password.',
      'auth/invalid-email':          'Please enter a valid email address.',
      'auth/user-disabled':          'This account has been disabled.',
      'auth/too-many-requests':      'Too many attempts — please try again later.',
      'auth/network-request-failed': 'Network error. Check your connection.',
      'auth/popup-blocked':          'Popup blocked — please allow popups for this site.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }

  function setLoading(btn, on) {
    btn.disabled = on;
    btn.innerHTML = on
      ? `<span class="btn-spinner"></span> Signing in…`
      : 'Sign In →';
  }

  function clearMessages() {
    document.getElementById('errorMsg').style.display   = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.querySelector('span').textContent = msg;
    el.style.display = 'flex';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.querySelector('span').textContent = msg;
    el.style.display = 'flex';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function googleBtnHTML() {
    return `<svg width="17" height="17" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M44.5 20H24v8.5h11.7C34.2 33.1 29.6 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6-6C34.3 6.1 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.2-2.7-.2-4z" fill="#FFC107"/>
      <path d="M6.3 14.7l7 5.1C15 16.1 19.2 13 24 13c3 0 5.7 1.1 7.8 2.9l6-6C34.3 6.1 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z" fill="#FF3D00"/>
      <path d="M24 44c5.3 0 10.1-1.9 13.8-5.1l-6.4-5.4C29.5 35.1 26.9 36 24 36c-5.6 0-10.2-3.8-11.8-9H5.1C8.5 37.6 15.7 44 24 44z" fill="#4CAF50"/>
      <path d="M44.5 20H24v8.5h11.7c-.7 2.2-2.1 4.1-3.9 5.4l6.4 5.4C41.7 35.9 44.5 30.4 44.5 24c0-1.3-.2-2.7-.2-4z" fill="#1976D2"/>
    </svg>
    Continue with Google`;
  }
</script>

<style>
  :root {
    --bg:       #080c10;
    --surface:  #0e1420;
    --surface2: #141c2a;
    --border:   #1e2d42;
    --accent:   #00e5a0;
    --accent2:  #00b8ff;
    --danger:   #ff4d6d;
    --text:     #e8f0fe;
    --muted:    #6b7fa3;
    --font:     'Sora', sans-serif;
    --mono:     'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text); font-family: var(--font);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }

  /* Grid background */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,229,160,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,.04) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    pointer-events: none;
  }

  /* Orbs */
  .orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; animation: drift 12s ease-in-out infinite alternate; }
  .orb-1 { width: 420px; height: 420px; background: radial-gradient(circle, rgba(0,229,160,.13), transparent 70%); top: -120px; left: -80px; }
  .orb-2 { width: 360px; height: 360px; background: radial-gradient(circle, rgba(0,184,255,.10), transparent 70%); bottom: -100px; right: -80px; animation-delay: -6s; }
  @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.06); } }

  /* Card */
  .card {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 40px 38px 34px; width: 100%; max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(0,229,160,.05);
    animation: cardIn .4s cubic-bezier(.22,1,.36,1);
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(28px) scale(.98); } to { opacity:1; transform:translateY(0) scale(1); } }

  /* Logo */
  .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-wrap img { height: 38px; width: auto; }
  .logo-badge {
    font-family: var(--mono); font-size: .61rem; letter-spacing: .1em;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); padding: 3px 10px; border-radius: 4px; text-transform: uppercase;
  }

  .card-title { font-size: 1.2rem; font-weight: 700; letter-spacing: -.02em; text-align: center; margin-bottom: 4px; }
  .card-sub   { font-size: .77rem; color: var(--muted); text-align: center; margin-bottom: 24px; }

  .divider { height: 1px; background: var(--border); margin: 0 -38px 24px; }

  /* Google button */
  .google-btn {
    width: 100%; padding: 11px 16px; margin-bottom: 20px;
    background: #fff; color: #3c4043;
    font-family: var(--font); font-size: .85rem; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all .18s; box-shadow: 0 1px 4px rgba(0,0,0,.3);
  }
  .google-btn:hover:not(:disabled) { background: #f1f3f4; box-shadow: 0 2px 8px rgba(0,0,0,.35); }
  .google-btn:disabled { opacity: .65; cursor: not-allowed; }

  /* OR divider */
  .or-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px; font-size: .7rem; color: var(--muted);
  }
  .or-row::before, .or-row::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Fields */
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: .69rem; font-weight: 600;
    letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px;
  }
  .input-wrap { position: relative; }
  .input-wrap > svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none; transition: color .18s;
  }
  .input-wrap input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font); font-size: .85rem;
    border-radius: 8px; padding: 11px 12px 11px 38px;
    outline: none; transition: border-color .18s, box-shadow .18s;
  }
  .input-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,160,.1); }
  .input-wrap input:focus + svg { color: var(--accent); }
  .input-wrap input::placeholder { color: var(--muted); opacity: .55; }

  /* Eye toggle */
  .eye-btn {
    position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer;
    padding: 4px; display: flex; align-items: center; transition: color .15s;
    z-index: 2;
  }
  .eye-btn:hover { color: var(--accent); }

  /* Forgot row */
  .pw-row { display: flex; justify-content: flex-end; margin-top: -6px; margin-bottom: 20px; }
  .forgot-link {
    font-size: .73rem; color: var(--muted); background: none; border: none;
    cursor: pointer; font-family: var(--font); padding: 0; transition: color .15s;
  }
  .forgot-link:hover { color: var(--accent); }

  /* Sign in button */
  .sign-in-btn {
    width: 100%; padding: 12px;
    background: var(--accent); color: #080c10;
    font-family: var(--font); font-size: .88rem; font-weight: 700;
    letter-spacing: .02em; border: none; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all .18s;
  }
  .sign-in-btn:hover:not(:disabled) { background: #00fdb4; box-shadow: 0 0 24px rgba(0,229,160,.3); }
  .sign-in-btn:disabled { opacity: .6; cursor: not-allowed; }

  .btn-spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(8,12,16,.25); border-top-color: #080c10;
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Messages */
  .msg {
    display: none; align-items: flex-start; gap: 10px;
    padding: 11px 14px; border-radius: 8px;
    font-size: .78rem; margin-bottom: 14px; line-height: 1.45;
  }
  .msg svg { flex-shrink: 0; margin-top: 1px; }
  .msg-error   { background: rgba(255,77,109,.08); border: 1px solid rgba(255,77,109,.22); color: #ff8099; }
  .msg-success { background: rgba(0,229,160,.07);  border: 1px solid rgba(0,229,160,.22);  color: var(--accent); }

  /* Enter hint */
  .enter-hint {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 12px; font-size: .65rem; color: var(--muted); opacity: .65; font-family: var(--mono);
  }
  .key-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; }

  /* Footer */
  .card-footer { margin-top: 22px; text-align: center; font-size: .69rem; color: var(--muted); }
  .card-footer a { color: var(--muted); text-decoration: none; transition: color .15s; }
  .card-footer a:hover { color: var(--accent); }

  @media (max-width: 480px) {
    .card { padding: 34px 22px 28px; margin: 14px; }
    .divider { margin: 0 -22px 22px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <img src="https://www.evoaiglobal.ai/images/logo.png" alt="evoAI"/>
    <span class="logo-badge">Lead Manager</span>
  </div>

  <div class="card-title">Welcome back</div>
  <div class="card-sub">Sign in to access your lead dashboard</div>

  <div class="divider"></div>

  <!-- Google Sign In -->
  <button class="google-btn" id="googleBtn" onclick="googleLogin()">
    <svg width="17" height="17" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M44.5 20H24v8.5h11.7C34.2 33.1 29.6 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6-6C34.3 6.1 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.2-2.7-.2-4z" fill="#FFC107"/>
      <path d="M6.3 14.7l7 5.1C15 16.1 19.2 13 24 13c3 0 5.7 1.1 7.8 2.9l6-6C34.3 6.1 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z" fill="#FF3D00"/>
      <path d="M24 44c5.3 0 10.1-1.9 13.8-5.1l-6.4-5.4C29.5 35.1 26.9 36 24 36c-5.6 0-10.2-3.8-11.8-9H5.1C8.5 37.6 15.7 44 24 44z" fill="#4CAF50"/>
      <path d="M44.5 20H24v8.5h11.7c-.7 2.2-2.1 4.1-3.9 5.4l6.4 5.4C41.7 35.9 44.5 30.4 44.5 24c0-1.3-.2-2.7-.2-4z" fill="#1976D2"/>
    </svg>
    Continue with Google
  </button>

  <!-- OR -->
  <div class="or-row">or sign in with email</div>

  <!-- Error / Success messages -->
  <div class="msg msg-error" id="errorMsg">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span></span>
  </div>
  <div class="msg msg-success" id="successMsg">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
    <span></span>
  </div>

  <!-- Email -->
  <div class="field">
    <label>Email Address</label>
    <div class="input-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email"
        onkeydown="if(event.key==='Enter')document.getElementById('password').focus()"/>
    </div>
  </div>

  <!-- Password -->
  <div class="field">
    <label>Password</label>
    <div class="input-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
        style="padding-right:42px;"
        onkeydown="if(event.key==='Enter')doSignIn()"/>
      <button class="eye-btn" id="eyeBtn" onclick="toggleEye()" type="button" title="Show / hide password">
        <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Forgot password -->
  <div class="pw-row">
    <button class="forgot-link" id="resetBtn" onclick="doReset()">Forgot password?</button>
  </div>

  <!-- Email sign in button -->
  <button class="sign-in-btn" id="signInBtn" onclick="doSignIn()">
    Sign In →
  </button>

  <!-- Enter hint -->
  <div class="enter-hint">
    <span class="key-badge">Enter ↵</span> to sign in
  </div>

  <!-- Footer -->
  <div class="card-footer">
    <a href="https://evoaiglobal.ai" target="_blank">evoaiglobal.ai</a>
    &nbsp;·&nbsp;
    <a href="https://evoaiglobal.ai/privacy-policy" target="_blank">Privacy</a>
    &nbsp;·&nbsp;
    <a href="https://evoaiglobal.ai/terms" target="_blank">Terms</a>
  </div>

</div>

<script>
  /* Eye toggle — plain script, no module scope issue */
  function toggleEye() {
    const pw   = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    const show = pw.type === 'password';
    pw.type = show ? 'text' : 'password';
    icon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
         <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
         <line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
         <circle cx="12" cy="12" r="3"/>`;
  }

  /* Global message helpers (called from module via window.*) */
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.querySelector('span').textContent = msg;
    el.style.display = 'flex';
    document.getElementById('successMsg').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.querySelector('span').textContent = msg;
    el.style.display = 'flex';
    document.getElementById('errorMsg').style.display = 'none';
  }
  function clearMessages() {
    document.getElementById('errorMsg').style.display   = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }
</script>
</body>
</html>
