<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>evoAI — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";

  import {
    getAuth,
    signInWithRedirect,
    getRedirectResult,
    signInWithEmailAndPassword,
    sendPasswordResetEmail,
    GoogleAuthProvider,
    onAuthStateChanged,
    setPersistence,
    browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

  /* ── PASTE YOUR FIREBASE CONFIG HERE ── */
  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  await setPersistence(auth, browserLocalPersistence);

  /* ── Handle redirect result on page load ── */
  try {
    const result = await getRedirectResult(auth);
    if (result?.user) {
      window.location.href = "/system/evoai-leads.html";
    }
  } catch (err) {
    showError(friendlyError(err.code));
  }

  /* ── Redirect if already logged in ── */
  onAuthStateChanged(auth, (user) => {
    if (user && !window.location.pathname.includes("evoai-leads.html")) {
      window.location.href = "/system/evoai-leads.html";
    }
  });

  /* ── Google Sign In (redirect method — no popup blocking) ── */
  window.googleLogin = async () => {
    const btn = document.getElementById('googleBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-spinner"></span> Redirecting…';
    clearMessages();
    try {
      await signInWithRedirect(auth, provider);
      // Page will navigate away — no code runs after this
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign in with Google`;
      showError(friendlyError(err.code));
    }
  };

  /* ── Email / Password Sign In ── */
  window.doSignIn = async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('signInBtn');

    if (!email || !password) { showError('Please enter your email and password.'); return; }

    setLoading(btn, true);
    clearMessages();

    try {
      await signInWithEmailAndPassword(auth, email, password);
      // onAuthStateChanged handles redirect
    } catch (err) {
      setLoading(btn, false);
      showError(friendlyError(err.code));
    }
  };

  /* ── Forgot Password ── */
  window.doReset = async () => {
    const email = document.getElementById('email').value.trim();
    if (!email) { showError('Enter your email address first, then click Forgot Password.'); return; }

    const btn = document.getElementById('resetBtn');
    btn.disabled    = true;
    btn.textContent = 'Sending…';
    clearMessages();

    try {
      await sendPasswordResetEmail(auth, email);
      showSuccess('Reset link sent — check your inbox.');
    } catch (err) {
      showError(friendlyError(err.code));
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Forgot password?';
    }
  };

  /* ── Helpers ── */
  function friendlyError(code) {
    const map = {
      'auth/invalid-credential':     'Invalid email or password.',
      'auth/user-not-found':         'No account found with this email.',
      'auth/wrong-password':         'Incorrect password.',
      'auth/invalid-email':          'Please enter a valid email address.',
      'auth/user-disabled':          'This account has been disabled.',
      'auth/too-many-requests':      'Too many attempts. Please try again later.',
      'auth/network-request-failed': 'Network error. Check your connection.',
      'auth/popup-blocked':          'Popup blocked. Please allow popups and try again.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }

  function setLoading(btn, on) {
    btn.disabled  = on;
    btn.innerHTML = on ? '<span class="btn-spinner"></span> Signing in…' : 'Sign In';
  }

  function clearMessages() {
    document.getElementById('errorMsg').style.display   = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.querySelector('span').textContent = msg;
    el.style.display = 'flex';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.querySelector('span').textContent = msg;
    el.style.display = 'flex';
    document.getElementById('errorMsg').style.display = 'none';
  }
</script>

<style>
  :root {
    --bg:       #080c10;
    --surface:  #0e1420;
    --surface2: #141c2a;
    --border:   #1e2d42;
    --accent:   #00e5a0;
    --accent2:  #00b8ff;
    --danger:   #ff4d6d;
    --text:     #e8f0fe;
    --muted:    #6b7fa3;
    --font:     'Sora', sans-serif;
    --mono:     'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,229,160,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,.04) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    pointer-events: none;
  }

  .orb {
    position: fixed; border-radius: 50%; filter: blur(90px);
    pointer-events: none; z-index: 0; animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(0,229,160,.13), transparent 70%);
    top: -120px; left: -80px;
  }
  .orb-2 {
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(0,184,255,.10), transparent 70%);
    bottom: -100px; right: -80px;
    animation-delay: -6s;
  }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.06); }
  }

  .card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 44px 40px 36px;
    width: 100%; max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(0,229,160,.05);
    animation: cardIn .4s cubic-bezier(.22,1,.36,1);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .logo-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 10px; margin-bottom: 32px;
  }
  .logo-wrap img { height: 40px; width: auto; }
  .logo-badge {
    font-family: var(--mono); font-size: .62rem; letter-spacing: .1em;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); padding: 3px 10px; border-radius: 4px;
    text-transform: uppercase;
  }

  .card-title {
    font-size: 1.25rem; font-weight: 700; letter-spacing: -.02em;
    text-align: center; margin-bottom: 4px;
  }
  .card-sub {
    font-size: .78rem; color: var(--muted);
    text-align: center; margin-bottom: 28px;
  }

  .divider { height: 1px; background: var(--border); margin: 0 -40px 28px; }

  /* ── Google Button ── */
  .google-btn {
    width: 100%; padding: 11px 16px;
    background: #fff; color: #3c4043;
    font-family: var(--font); font-size: .86rem; font-weight: 600;
    border: 1px solid #dadce0; border-radius: 8px;
    cursor: pointer; transition: all .18s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 20px;
  }
  .google-btn:hover:not(:disabled) {
    background: #f8f9fa;
    box-shadow: 0 2px 12px rgba(0,0,0,.15);
  }
  .google-btn:disabled { opacity: .6; cursor: not-allowed; }

  /* ── OR divider ── */
  .or-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .or-row::before, .or-row::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .or-row span {
    font-size: .7rem; color: var(--muted); white-space: nowrap;
    font-family: var(--mono); letter-spacing: .06em;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: .7rem; font-weight: 600;
    letter-spacing: .07em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .input-wrap { position: relative; }
  .input-wrap > svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none; transition: color .18s;
  }
  .input-wrap input {
    width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font); font-size: .85rem;
    border-radius: 8px; padding: 11px 12px 11px 38px;
    outline: none; transition: border-color .18s, box-shadow .18s;
  }
  .input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,160,.1);
  }
  .input-wrap input::placeholder { color: var(--muted); opacity: .6; }

  .eye-btn {
    position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer;
    padding: 2px; display: flex; align-items: center; transition: color .15s;
  }
  .eye-btn:hover { color: var(--accent); }

  .pw-row {
    display: flex; justify-content: flex-end;
    margin-top: -8px; margin-bottom: 22px;
  }
  .forgot-link {
    font-size: .74rem; color: var(--muted); background: none; border: none;
    cursor: pointer; font-family: var(--font); padding: 0; transition: color .15s;
  }
  .forgot-link:hover { color: var(--accent); }

  .sign-in-btn {
    width: 100%; padding: 12px;
    background: var(--accent); color: #080c10;
    font-family: var(--font); font-size: .88rem; font-weight: 700;
    letter-spacing: .03em; border: none; border-radius: 8px;
    cursor: pointer; transition: all .18s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .sign-in-btn:hover:not(:disabled) { background: #00fdb4; box-shadow: 0 0 24px rgba(0,229,160,.3); }
  .sign-in-btn:disabled { opacity: .6; cursor: not-allowed; }

  .btn-spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(8,12,16,.3); border-top-color: #080c10;
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .msg {
    display: none; align-items: flex-start; gap: 10px;
    padding: 11px 14px; border-radius: 8px;
    font-size: .79rem; margin-bottom: 16px; line-height: 1.45;
  }
  .msg svg { flex-shrink: 0; margin-top: 1px; }
  .msg-error   { background: rgba(255,77,109,.08); border: 1px solid rgba(255,77,109,.2); color: #ff8099; }
  .msg-success { background: rgba(0,229,160,.07);  border: 1px solid rgba(0,229,160,.2);  color: var(--accent); }

  .enter-hint {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 12px; font-size: .67rem; color: var(--muted); opacity: .7;
    font-family: var(--mono);
  }
  .key-badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px; font-size: .65rem;
  }

  .card-footer {
    margin-top: 24px; text-align: center; font-size: .7rem; color: var(--muted);
  }
  .card-footer a { color: var(--muted); text-decoration: none; transition: color .15s; }
  .card-footer a:hover { color: var(--accent); }

  @media (max-width: 480px) {
    .card { padding: 36px 24px 28px; margin: 16px; }
    .divider { margin: 0 -24px 24px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <img src="https://www.evoaiglobal.ai/images/logo.png" alt="evoAI"/>
    <span class="logo-badge">Lead Manager</span>
  </div>

  <div class="card-title">Welcome back</div>
  <div class="card-sub">Sign in to access your lead dashboard</div>

  <div class="divider"></div>

  <!-- Error / Success messages -->
  <div class="msg msg-error" id="errorMsg">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span></span>
  </div>
  <div class="msg msg-success" id="successMsg">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
    <span></span>
  </div>

  <!-- Google Sign In -->
  <button class="google-btn" id="googleBtn" onclick="googleLogin()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Sign in with Google
  </button>

  <!-- OR divider -->
  <div class="or-row"><span>or sign in with email</span></div>

  <!-- Email -->
  <div class="field">
    <label>Email Address</label>
    <div class="input-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email"
        onkeydown="if(event.key==='Enter')document.getElementById('password').focus()"/>
    </div>
  </div>

  <!-- Password -->
  <div class="field">
    <label>Password</label>
    <div class="input-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
        style="padding-right:42px;" onkeydown="if(event.key==='Enter')doSignIn()"/>
      <button class="eye-btn" id="eyeBtn" onclick="toggleEye()" type="button" title="Show / hide password">
        <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Forgot password -->
  <div class="pw-row">
    <button class="forgot-link" id="resetBtn" onclick="doReset()">Forgot password?</button>
  </div>

  <!-- Email sign in button -->
  <button class="sign-in-btn" id="signInBtn" onclick="doSignIn()">Sign In</button>

  <!-- Enter hint -->
  <div class="enter-hint">
    <span class="key-badge">Enter ↵</span> to sign in
  </div>

  <!-- Footer -->
  <div class="card-footer">
    <a href="https://evoaiglobal.ai" target="_blank">evoaiglobal.ai</a>
    &nbsp;·&nbsp;
    <a href="https://evoaiglobal.ai/privacy-policy" target="_blank">Privacy</a>
    &nbsp;·&nbsp;
    <a href="https://evoaiglobal.ai/terms" target="_blank">Terms</a>
  </div>

</div>

<script>
  function toggleEye() {
    const pw   = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    const show = pw.type === 'password';
    pw.type = show ? 'text' : 'password';
    icon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.querySelector('span').textContent = msg;
    el.style.display = 'flex';
    document.getElementById('successMsg').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.querySelector('span').textContent = msg;
    el.style.display = 'flex';
    document.getElementById('errorMsg').style.display = 'none';
  }
  function clearMessages() {
    document.getElementById('errorMsg').style.display   = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }
</script>
</body>
</html>
